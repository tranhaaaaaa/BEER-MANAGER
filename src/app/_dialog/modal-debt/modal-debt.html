<div class="modal-overlay" *ngIf="visible">
<c-modal
  [visible]="visible"
  (visibleChange)="visible = $event"
  alignment="center"
  size="lg">

  <c-modal-header class="border-0 pb-0">
    <h4 cModalTitle class="fw-bold text-primary">
      <i class="cil-user me-2"></i>
      Ký nợ khách hàng
    </h4>
  </c-modal-header>

  <c-modal-body>

    <!-- CHỌN KHÁCH -->
    <div class="customer-select-card">

      <label class="form-label fw-semibold">
        Chọn khách hàng
      </label>

      <select
        cFormSelect
        [(ngModel)]="selectedUserId"
        class="form-select form-select-lg">

        <option value="">Chọn khách quen...</option>

        <option *ngFor="let u of listUser" [value]="u.Uid">
          {{u.Name}} - {{u.Phone}}
        </option>

      </select>

      <button
        cButton
        color="primary"
        variant="outline"
        class="mt-3"
        (click)="openCreateUser()">

        + Thêm khách mới

      </button>

    </div>

    <!-- FORM TẠO KHÁCH -->
    <div
      *ngIf="showCreateUser"
      class="create-user-card mt-4">

      <h6 class="fw-bold mb-3 text-secondary">
        Thêm khách hàng mới
      </h6>

      <form [formGroup]="userForm">

        <div class="row">

          <div class="col-md-6 mb-3">
            <label class="form-label">Họ và tên</label>

            <input
              cFormControl
              type="text"
              placeholder="Nhập tên khách"
              formControlName="Name">
          </div>

          <div class="col-md-6 mb-3">
            <label class="form-label">Số điện thoại</label>

            <input
              cFormControl
              type="text"
              placeholder="Nhập số điện thoại"
              formControlName="Phone">
          </div>

        </div>

        <div class="mb-3">
          <label class="form-label">Địa chỉ</label>

          <input
            cFormControl
            type="text"
            placeholder="Nhập địa chỉ khách"
            formControlName="Address">
        </div>

        <button
          cButton
          color="success"
          class="px-4"
          (click)="saveUser()">

          Lưu khách hàng

        </button>

      </form>

    </div>

  </c-modal-body>

  <c-modal-footer class="border-0 pt-0">

    <button
      cButton
      color="secondary"
      variant="outline"
      (click)="close()">

      Hủy

    </button>

    <button
      cButton
      color="warning"
      class="px-4 fw-semibold">

      Xác nhận ký nợ

    </button>

  </c-modal-footer>

</c-modal>
</div>
