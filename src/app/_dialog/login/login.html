<c-modal
  alignment="center"
  [visible]="visible"
  (visibleChange)="visible = $event"
  class="signup-modal"
>
  <c-modal-body class="p-0">
    <div class="signup-card">
      <h3 class="title">Sign up</h3>

      <button class="google-btn">
        <img src="//www.gstatic.com/images/branding/googleg_gradient/1x/googleg_gradient_standard_40dp.png" />
        Sign up with Google
      </button>

      <div class="divider">
        <span>Or</span>
      </div>

      <form [formGroup]="form">
        <label>Tài khoản</label>
        <input type="text" placeholder="Nhập tên tài khoản" formControlName="Username" />

        <label>Mật khẩu</label>
        <input type="password" placeholder="Nhập mật khẩu" formControlName="Password" />

        <button class="signup-btn" (click)="login()">Đăng nhập</button>
      </form>

      
    </div>
  </c-modal-body>
</c-modal>
