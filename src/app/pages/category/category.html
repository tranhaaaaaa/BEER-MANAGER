<div class="container-fluid p-3 p-md-4">

  <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center mb-3 gap-2">
    <h4 class="fw-bold m-0">Quản lý danh mục</h4>

    <button
      class="btn btn-success w-md-auto"
      (click)="openAdd()">

      + Thêm danh mục
    </button>
  </div>


  <!-- TYPE SELECT -->

  <div class="row g-3 mb-4">

    <div class="col-6 col-md-4 col-lg-3">
      <div
        class="type-card"
        [class.active]="currentType == 1"
        (click)="changeType(1)">

        <div class="type-icon">🪑</div>
        <div class="type-title">Danh mục bàn</div>

      </div>
    </div>

    <div class="col-6 col-md-4 col-lg-3">
      <div
        class="type-card"
        [class.active]="currentType == 2"
        (click)="changeType(2)">

        <div class="type-icon">🍔</div>
        <div class="type-title">Đồ ăn</div>

      </div>
    </div>

  </div>


  <!-- TABLE -->

  <div class="table-responsive">

    <table class="table table-hover table-bordered align-middle">

      <thead class="table-light">
        <tr>
          <th>Tên</th>
          <th>Mô tả</th>
          <th width="120">Action</th>
        </tr>
      </thead>

      <tbody>

        <tr *ngFor="let item of filteredCategory">

          <td class="fw-semibold">
            {{item.Name}}
          </td>

          <td class="text-muted">
            {{item.Description}}
          </td>

          <td>

            <button
              class="btn btn-warning btn-sm w-100"
              (click)="openEdit(item)">

              Sửa

            </button>

          </td>

        </tr>

      </tbody>

    </table>

  </div>

</div>

<app-modal-category (saveCategory)="onSave()" [type]="currentType"></app-modal-category>
