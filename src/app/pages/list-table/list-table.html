<div class="pos-container">
  <div class="table-panel">
    <div class="table-filter">
      <button class="filter-btn" [class.active]="!currentCategory" (click)="filterTable()">
        Tất cả
      </button>
      <button
        class="filter-btn"
        *ngFor="let cate of categories"
        [class.active]="currentCategory === cate.Id"
        (click)="filterTable(cate)"
      >
        {{ cate.Name }}
      </button>
    </div>
    <div class="table-grid">
      <div class="table-box" *ngFor="let table of filteredOrders" (click)="openAdd(table.OrderUid)">
        <div class="table-card" [class.busy]="table.TotalAmount > 0">
           <p class="status-badge-custom status-created mb-1 mt-1">{{table.OrderDate | date: 'dd/MM/yyyy HH:mm:ss'}}</p>
            <span class="status-badge"
        [ngClass]="{
          'status-unpaid': table.Status == 0,
          'status-debt': table.Status == -1,
          'status-paid': table.Status == 1
        }">

    {{ table.Status == 0 ? 'Chưa thanh toán' :
       table.Status == -1 ? 'Ký nợ' :
       table.Status == 1 ? 'Đã thanh toán' : '' }}

  </span>
 
          <div class="table-number">
            {{ table.Name }}
          </div>
          <div class="table-price">{{ table.TotalAmount | number }} đ</div>
        </div>
      </div>
    </div>
  </div>
</div>
<app-modal-create-table [ORDER_ID]="orderId"></app-modal-create-table>
<app-payment-type></app-payment-type>
