<c-card class="order-card">
  <c-card-header class="order-header">
    <div>
      <div class="title">📦 Danh sách đơn hàng</div>
      <div class="subtitle">Quản lý đơn hàng theo thời gian thực</div>
    </div>
    <div class="total">
      {{ listOrder.length }} đơn
    </div>
  </c-card-header>

  <c-card-body>

    <div class="table-responsive">
      <table cTable class="order-table">

        <thead>
          <tr>
            <th>Khách hàng</th>
            <th>Ngày đặt</th>
            <th>Tổng tiền</th>
            <th>Trạng thái</th>
          </tr>
        </thead>

        <tbody>
          <tr *ngFor="let item of pagedOrders">


            <td class="customer">
              {{ item.Name }}
            </td>

            <td class="date">
              {{ item.OrderDate | date: 'dd/MM/yyyy HH:mm' }}
            </td>

            <td class="amount">
              {{ item.TotalAmount | number: '1.0-0' }} đ
            </td>

            <td>
              <span class="status-badge" [ngClass]="getStatusClass(item.Status)">
                {{ getStatusText(item.Status) }}
              </span>
            </td>

          </tr>
        </tbody>

      </table>
    </div>

    <!-- Pagination -->
    <div class="pagination-wrapper">
      <ul class="pagination">

        <li class="page-item" [class.disabled]="currentPage === 1">
          <button class="page-link" (click)="changePage(currentPage - 1)">«</button>
        </li>

        <li class="page-item"
            *ngFor="let page of [].constructor(totalPages); let i = index"
            [class.active]="currentPage === i + 1">
          <button class="page-link" (click)="changePage(i + 1)">
            {{ i + 1 }}
          </button>
        </li>

        <li class="page-item" [class.disabled]="currentPage === totalPages">
          <button class="page-link" (click)="changePage(currentPage + 1)">»</button>
        </li>

      </ul>
    </div>

  </c-card-body>
</c-card>
