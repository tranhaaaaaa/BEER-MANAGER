<c-card class="shadow-sm border-0">
  <c-card-header class="bg-light d-flex justify-content-between align-items-center">
    <strong>📊 Danh sách giao dịch</strong>
    <span class="text-muted">Tổng: {{ listTransaction.length }}</span>
  </c-card-header>

  <c-card-body>
<div class="table-responsive">
    <table cTable striped hover responsive class="align-middle text-center">
      <thead class="table-light">
        <tr>
          <th class="hide-mobile">Id</th>
          <th>Gateway</th>
          <th>Ngày giao dịch</th>
          <th>Số tiền</th>
          <th class="hide-mobile">Mã tham chiếu</th>
        </tr>
      </thead>

      <tbody>
        <tr *ngFor="let item of pagedTransactions"
      [ngClass]="{'table-success': item.TransferType === 'in'}">

    <td class="fw-bold hide-mobile">{{ item.Id }}</td>

    <td>
      <span class="badge bg-info text-dark">
        {{ item.Gateway }}
      </span>
    </td>

    <td>
      {{ item.TransactionDate | date:'dd/MM/yyyy HH:mm:ss' }}
    </td>

    <td class="fw-semibold text-success">
      {{ item.TransferAmount | number:'1.0-0' }} VND
    </td>

    <td class="text-muted hide-mobile">
      {{ item.ReferenceCode }}
    </td>
  </tr>
      </tbody>
    </table>
</div>
    <div class="d-flex justify-content-center mt-3">
      <nav>
        <ul class="pagination">

          <li class="page-item" [class.disabled]="currentPage === 1">
            <button class="page-link" (click)="changePage(currentPage - 1)">
              «
            </button>
          </li>

          <li class="page-item"
              *ngFor="let page of [].constructor(totalPages); let i = index"
              [class.active]="currentPage === i + 1">
            <button class="page-link" (click)="changePage(i + 1)">
              {{ i + 1 }}
            </button>
          </li>

          <li class="page-item" [class.disabled]="currentPage === totalPages">
            <button class="page-link" (click)="changePage(currentPage + 1)">
              »
            </button>
          </li>

        </ul>
      </nav>
    </div>

  </c-card-body>
</c-card>
